[mypy]
# Configura o Mypy para ser mais flexível
warn_unused_configs = True

# Padrão para todos os módulos
python_version = 3.12
# Não força a verificação de todas as funções
disallow_untyped_defs = False
# Não exige que todas as chamadas de funções tenham tipagem
disallow_untyped_calls = False

# Descomente a linha abaixo para ser mais rigoroso ainda
# strict = True

# Configurações específicas para o seu módulo
[mypy-src.*]
# Relaxa a verificação em arquivos da pasta 'src'
follow_imports = skip
check_untyped_defs = False
disallow_untyped_defs = False
warn_return_any = False
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = False
warn_incomplete_stub = False
warn_unused_configs = True